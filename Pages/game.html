<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Page</title>
    <link rel="stylesheet" href="../Styles/main.css" />
    <link rel="stylesheet" href="../Styles/game.css" />
    <script defer src="../Scripts/game.js"></script>
</head>
<body>
    <main class="game__container">
        <div class="game__elements">
            <button>Previous Level</button>
            <h1 class="game__title" id="level__title">Level 1</h1>
            <button>Next Level</button>
        </div>
      <div id="game__area"></div>  
      <div id="overlay">
        <div class="win__container">
            <h2>Congats! You have completed the level!</h2>
            <div class="buttons__container">
            <button>Play Again</button>
            <button>Next Level</button>
            </div>
        </div>
      </div>
    </main>
</body>
</html>
