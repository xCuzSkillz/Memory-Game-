<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Page</title>
    <link rel="stylesheet" href="./Styles/main.css" />
    <link rel="stylesheet" href="./Styles/game.css" />
    <script defer src="./Scripts/game.js"></script>
</head>
<body>
    <main class="game__container">
        <div class="game__elements">
            <h1 class="game__title" id="level__title">Level 1</h1>
        </div>
      <div id="game__area"></div>  
      <div id="overlay">
        <div class="win__container">
            <h2>Congrats! You have completed the level!</h2>
            <div class="buttons__container">
            <button id="playAgain">Play Again</button>
            <button id="nextLevel">Next Level</button>
            </div>
        </div>
      </div>
      <div id="overlay__lose">
        <div class="win__container">
            <h2 id="total__slots"></h2>
            <div class="buttons__container">
            <button id="playAgainLose">Play Again</button>
          </div>
        </div>
      </div>
       <div id="overlay_last">
         <div class="win__container">
            <h2>Close Road</h2>
            <h2>You absolutely naild it</h2>
            <div class="images__disp">
                <img width="500" height="500"  src="https://i.pinimg.com/736x/88/cb/16/88cb1633c8be0a5c6d397818841f9175.jpg" />
                <img width="500" height="500"  src="https://i.pinimg.com/736x/e8/20/89/e820895306a559d6b1ab7a8ea1d2ace5.jpg" />
                 <img width="500" height="500"  src="https://i.pinimg.com/736x/9d/d9/43/9dd943917abaa823b75c6e70a35c7405.jpg" />
            </div>
         </div>
        </div>
      </div>
    </main>
</body>
</html>
